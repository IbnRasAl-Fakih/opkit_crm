services:
  postgres:
    image: postgres:16-alpine
    container_name: opkit_crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opkit_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d opkit_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
